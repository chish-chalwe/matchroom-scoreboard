name: Build Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup CMake Environment
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.24.x'

    - name: Set Up MSVC Dev Cmd compiler paths
      uses: ilammy/msvc-dev-cmd@v1

    - name: Fetch OBS Studio Dependencies
      shell: powershell
      run: |
        $maxRetries = 3
        $retryCount = 0
        $success = $false
        
        while ($retryCount -lt $maxRetries -and -not $success) {
          try {
            [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12
            Invoke-WebRequest -Uri "https://github.com/obsproject/obs-studio/releases/download/30.0.0/obs-studio-30.0.0-x64.zip" -OutFile "obs-studio.zip" -TimeoutSec 60
            Expand-Archive -Path "obs-studio.zip" -DestinationPath "obs-deps"
            $success = $true
            Write-Host "Successfully downloaded and extracted OBS dependencies"
          }
          catch {
            $retryCount++
            if ($retryCount -lt $maxRetries) {
              Write-Host "Download attempt $retryCount failed. Retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
            else {
              throw "Failed to download OBS dependencies after $maxRetries attempts: $_"
            }
          }
        }

    - name: Run Build Execution Engine
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -Dlibobs_DIR="../obs-deps/cmake/libobs" -Dobs-frontend-api_DIR="../obs-deps/cmake/obs-frontend-api"
        cmake --build . --config Release

    - name: Upload Finished Compiled Binary Artifact Bundle
      uses: actions/upload-artifact@v4
      with:
        name: matchroom-scoreboard-windows-x64
        path: build/Release/matchroom-scoreboard.dll
